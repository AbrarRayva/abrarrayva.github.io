<!DOCTYPE html>
<html>
   <head>
      <title>Redirecting...</title>
      <meta http-equiv = "refresh" content = "1; url = https://instagram.com/AbrarRayva" />
      <meta charset="utf-8">
      <meta name="viewport" content="width=device-width, initial-scale=1">
      <!-- CSS Styling -->
      <style>
          *{
              margin: 0;
              padding: 0;
              font-family: BlinkMacSystemFont,-apple-system,"Segoe UI",Roboto,Oxygen,Ubuntu,Cantarell,"Fira Sans","Droid Sans","Helvetica Neue",Helvetica,Arial,sans-serif;
          }

          body{
              background-color: #0c0c0c;
              color: white;
          }

          .navigation a{
              text-decoration: none;
              color: rgb(255, 255, 255);
              text-align: center;
              padding: 12px;
              text-decoration: none;
              font-size: 18px; 
              line-height: 25px;
              border-radius: 4px;
          }

          .navigation{
              display: inline-block;
              float: right;
          }

          .navigation a:hover{
              background-color: #2c2c2c;
          }

          .header {
              overflow: hidden;
              background-color: #1b1b1b;
              padding: 20px 10px;
          }

          body .redirect{
            text-align: center;
            margin: 40px;
          }
      </style>
   </head>
   <body>
    <header class="header">
        <div class="navigation">
            <a href="https://discord.io/Darkful" target="_blank">Discord</a>
            <a href="https://youtube.com/c/Darkful" target="_blank">YouTube</a>
            <a href="https://twitter.com/AbrarRayva" target="_blank">Twitter</a>
            <a href="https://instagram.com/AbrarRayva" target="_blank">Instagram</a>
        </div>
    </header>
