<!DOCTYPE html>
<html>
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>"Page not found!" - AbrarRayva</title>

        <style>
            @import url('https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300;0,400;0,600;0,700;0,800;1,300;1,400;1,600;1,700;1,800&display=swap');

            *{
                margin: 0;
                padding: 0;
                box-sizing: border-box;
                font-family: 'Open Sans', sans-serif;
            }

            a{
                text-decoration: none;
            }

            header{
                display: -webkit-flex;
                display: -moz-flex;
                display: -ms-flex;
                display: -o-flex;
                display: flex;
                justify-content: space-between;
                align-items: center;
                padding: 30px 70px;
            }
            
            .nav-area{
                list-style: none;
            }

            .home:hover{
                filter: drop-shadow(0px 0px 5px #707070);
                transition: 200ms;
            }

            .nav-area li{
                display: inline-block;
                padding: 0 15px;
                text-transform: uppercase;
            }

            .nav-area li a:hover{
                filter: drop-shadow(0px 0px 5px #707070);
                transition: 200ms;
            }
            
            .content{
                min-width: 100%;
                height: auto;
            }

            .content-title{
                margin-bottom: 1%;
                min-width: 100%;
                height: auto;
            }

            .content-title p{
                margin-left: 3%;
                font-weight: 700;
                
            }

            .content-paragraph{
                margin-left: 3%;
                margin-bottom: 1%;
                min-width: 100%;
                height: auto;
            }

        </style>
    </head>
    <body>
        <header>
            <a href="index.html"><img class="home" src="assets/svg/bx-home-alt.svg"></a>
            <nav>
                <ul class="nav-area">
                    <li><a href="https://instagram.com/abrarrayva"><img src="assets/svg/bxl-instagram.svg"></a></li>
                    <li><a href="https://twitter.com/abrarrayva"><img src="assets/svg/bxl-twitter.svg"></a></li>
                    <li><a href="https://github.com/abrarrayva"><img src="assets/svg/bxl-github.svg"></a></li>
                </ul>
            </nav>
        </header>
        <div class="content">
            <div class="content-title">
                <p>Error 404</p>
            </div>
            <div class="content-paragraph">
                <p>The webpage you're looking for doesn't exist or has been deleted.</p>
            </div>
            </div>
        </div>
    </body>
</html>
